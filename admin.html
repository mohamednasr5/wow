<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background:#f1f5f9; margin:0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    table { width:100%; border-collapse: collapse; background:white; border-radius:12px; overflow:hidden; }
    th, td { padding: 14px; text-align: right; border-bottom: 1px solid #ddd; }
    th { background: #1e40af; color: white; }
    .test-panel { background:white; padding:25px; border-radius:12px; margin:20px 0; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="container">
  <h1>🔧 لوحة الإدارة</h1>
  
  <div class="test-panel">
    <h2>🧪 اختبار الميزات (للمدير)</h2>
    <button onclick="testLocation()">اختبار الموقع</button>
    <button onclick="testCamera()">اختبار الكاميرا</button>
    <button onclick="testMic()">اختبار الميكروفون</button>
    
    <video id="admin-video" autoplay playsinline style="width:100%; max-width:500px; margin:15px 0; border-radius:12px; display:none;"></video>
    <div id="admin-location"></div>
  </div>

  <h2>الزوار الحاليين (<span id="count">0</span>)</h2>
  <table id="table">
    <thead>
      <tr>
        <th>معرف الزائر</th>
        <th>الجهاز</th>
        <th>المدة</th>
        <th>الموقع</th>
        <th>الكاميرا</th>
        <th>الميكروفون</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  const firebaseConfig = { /* نفس الإعدادات */ 
    apiKey: "AIzaSyBQ9MlVOSzohuTqSA2JdI19UjyldnAb-zI",
    authDomain: "ohaha-d130e.firebaseapp.com",
    projectId: "ohaha-d130e",
    storageBucket: "ohaha-d130e.firebasestorage.app",
    messagingSenderId: "309282072723",
    appId: "1:309282072723:web:ed17bfe365577fba2ec566"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let isLoggedIn = false;

  function login() {
    const pass = prompt("أدخل كلمة مرور الإدارة:");
    if (pass === "521988") {
      isLoggedIn = true;
      loadVisitors();
    } else {
      alert("كلمة مرور خاطئة!");
      window.location.href = "index.html";
    }
  }

  function loadVisitors() {
    const tbody = document.querySelector('#table tbody');
    db.ref('visitors').on('value', snap => {
      tbody.innerHTML = '';
      let count = 0;
      snap.forEach(child => {
        count++;
        const d = child.val();
        const row = `
          <tr>
            <td>${child.key}</td>
            <td>${d.device || '-'}</td>
            <td>${d.sessionDuration || 0} ث</td>
            <td>${d.location ? '✅' : '❌'}</td>
            <td>${d.permissions?.camera ? '✅' : '❌'}</td>
            <td>${d.permissions?.mic ? '✅' : '❌'}</td>
          </tr>`;
        tbody.innerHTML += row;
      });
      document.getElementById('count').textContent = count;
    });
  }

  // اختبار الميزات للمدير
  function testLocation() {
    navigator.geolocation.getCurrentPosition(p => {
      document.getElementById('admin-location').innerHTML = `<strong>موقعك:</strong> ${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`;
    });
  }

  let adminStream = null;
  function testCamera() {
    navigator.mediaDevices.getUserMedia({video: true}).then(s => {
      adminStream = s;
      document.getElementById('admin-video').srcObject = s;
      document.getElementById('admin-video').style.display = 'block';
    });
  }

  function testMic() {
    alert("الميكروفون مفعل (جرب التحدث)");
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'ar-SA';
    rec.onresult = e => alert("سمعت: " + e.results[0][0].transcript);
    rec.start();
  }

  window.onload = login;
</script>
</body>
</html>
